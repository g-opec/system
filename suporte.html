<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="https://g-opec.github.io/master/fav/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://g-opec.github.io/master/fav/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://g-opec.github.io/master/fav/favicon-16x16.png">
    <title>Suporte - G-opec</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #2C2C32;
            --bg-darker: #1e1e24;
            --bg-card: #35353d;
            --accent-red: #ff0000;
            --accent-red-hover: #cc0000;
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Header --- */
        header {
            background-color: rgba(30, 30, 36, 0.95);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 0, 0, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            background-image: url('https://g-opec.github.io/master/fav/favicon-32x32.png');
            background-size: 24px;
            background-repeat: no-repeat;
            background-position: left center;
            padding-left: 36px;
            font-size: 20px;
            font-weight: 400;
            color: white;
            text-decoration: none;
        }

        .nav-btn {
            background-color: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-btn:hover {
            background-color: var(--accent-red);
            color: white;
        }

        /* --- Formulário de Suporte --- */
        .support-section {
            flex: 1;
            padding: 60px 0;
            display: flex;
            align-items: center;
        }

        .contact-wrapper {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 40px 50px;
            border-radius: 15px;
            border: 1px solid var(--bg-darker);
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .contact-wrapper h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .contact-wrapper p {
            color: var(--text-gray);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-gray);
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #2c2c34;
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--accent-red);
        }

        .btn-main {
            background-color: var(--accent-red);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-weight: 700;
            display: block;
            width: 100%;
            text-align: center;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-main:hover {
            background-color: var(--accent-red-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }

        /* --- Footer --- */
        footer {
            background-color: #111;
            padding: 20px 0;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .contact-wrapper {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">G-opec</a>
            <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Voltar ao Início</a>
        </div>
    </header>

    <section class="support-section">
        <div class="container">
            <div class="contact-wrapper">
                <div style="text-align: center;">
                    <h2><i class="fas fa-headset" style="color: var(--accent-red);"></i> Central de Suporte</h2>
                    <p>Envie sua dúvida, sugestão ou reporte um problema técnico.</p>
                </div>
                
                <form id="supportForm">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" name="nome" placeholder="Digite seu nome" required>
                    </div>
                    <div class="form-group">
                        <label>E-mail para Retorno</label>
                        <input type="email" name="email" placeholder="seuemail@exemplo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Assunto</label>
                        <select name="tipo" required>
                            <option value="Dúvida">Dúvida</option>
                            <option value="Sugestão">Sugestão de Melhoria</option>
                            <option value="Problema Técnico">Reportar Problema Técnico</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mensagem</label>
                        <textarea name="mensagem" rows="5" placeholder="Descreva sua solicitação com o máximo de detalhes possível..." required></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-main">Enviar Mensagem</button>

                    <p id="formStatus" style="display:none; text-align:center; margin-top:15px; font-weight:bold;"></p>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 G-opec. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        document.getElementById('supportForm').addEventListener('submit', function (e) {
            e.preventDefault();

            var btn = document.getElementById('submitBtn');
            var status = document.getElementById('formStatus');
            var form = this;

            // Feedback de carregamento
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // Coleta os dados para envio
            var formData = new FormData(form);

            // URL do seu web app público (post-Gopec)
            var scriptURL = 'https://script.google.com/macros/s/AKfycbz9nmtjMBrkQ4PsXMUiYpNy93vxMuwfnxIrwYKave3sWNfvsDBDiL___LHS8FOYQh15/exec';

            fetch(scriptURL, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === "success") {
                    status.style.display = 'block';
                    status.style.color = '#4CAF50'; 
                    status.textContent = 'Sua mensagem foi enviada com sucesso! Retornaremos em breve.';
                    form.reset(); 
                } else {
                    throw new Error(data.error);
                }
            })
            .catch(error => {
                console.error('Erro!', error);
                status.style.display = 'block';
                status.style.color = '#ff4444';
                status.textContent = 'Erro ao enviar. Tente novamente mais tarde.';
            })
            .finally(() => {
                // Restaura o botão após o processamento
                setTimeout(() => {
                    btn.innerHTML = 'Enviar Mensagem';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                    status.style.display = 'none';
                }, 5000);
            });
        });
    </script>
</body>
</html>
